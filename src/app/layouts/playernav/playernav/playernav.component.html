<nav
  class="sticky top-0 z-50 backdrop-blur-2xl bg-white/80 dark:bg-slate-950/70 border-b border-slate-200/60 dark:border-slate-800/60">

  <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">

    <!-- Logo -->
    <div class="flex items-center gap-4">
      <div
        class="w-12 h-12 bg-[#2E7D32] rounded-[1.25rem] flex items-center justify-center shadow-xl shadow-emerald-200/50">
        <span class="text-white italic font-black text-2xl">E</span>
      </div>
      <span class="text-2xl sm:text-3xl font-black tracking-tighter text-slate-900 dark:text-white">
        Ehgazly
      </span>
    </div>

    <!-- Desktop links -->
    <div class="hidden md:flex items-center gap-10 text-[15px] font-bold text-slate-500 dark:text-slate-300">
      <a [routerLink]="FriendlyMatchesLink" class="hover:text-[#2E7D32] transition-colors relative"
        [ngClass]="{'text-[#2E7D32] after:absolute after:-bottom-2 after:left-1/2 after:-translate-x-1/2 after:w-1.5 after:h-1.5 after:bg-[#2E7D32] after:rounded-full': active === 'friendly-matches'}">
        Friendly Matches
      </a>

      <a [routerLink]="tournamentsLink" class="hover:text-[#2E7D32] transition-colors relative"
        [ngClass]="{'text-[#2E7D32] after:absolute after:-bottom-2 after:left-1/2 after:-translate-x-1/2 after:w-1.5 after:h-1.5 after:bg-[#2E7D32] after:rounded-full': active === 'tournaments'}">
        Tournaments
      </a>

      <a [routerLink]="venuesLink" class="hover:text-[#2E7D32] transition-colors relative"
        [ngClass]="{'text-[#2E7D32] after:absolute after:-bottom-2 after:left-1/2 after:-translate-x-1/2 after:w-1.5 after:h-1.5 after:bg-[#2E7D32] after:rounded-full': active === 'venues'}">
        Courts
      </a>

      <a [routerLink]="myBookingsLink" class="hover:text-[#2E7D32] transition-colors relative"
        [ngClass]="{'text-[#2E7D32] after:absolute after:-bottom-2 after:left-1/2 after:-translate-x-1/2 after:w-1.5 after:h-1.5 after:bg-[#2E7D32] after:rounded-full': active === 'my-bookings'}">
        My Bookings
      </a>
    </div>

    <!-- Right icons -->
    <div class="flex items-center gap-3">
      <!-- Notification -->
      <button routerLink="/PlayerNotifications"
        class="w-12 h-12 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-white/5 rounded-2xl border border-slate-200 dark:border-slate-800 relative">
        <lucide-icon name="bell" [size]="20" class="text-slate-600 dark:text-slate-300"></lucide-icon>
        <span class="absolute top-3 right-3 w-2.5 h-2.5 bg-red-500 rounded-full"></span>
      </button>

      <!-- Profile Dropdown -->
      <div class="relative">
        <!-- Trigger -->
        <button type="button" (click)="toggleProfileMenu($event)"
          class="w-12 h-12 rounded-2xl bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-slate-800 flex items-center justify-center cursor-pointer transition-all"
          [class.profile-active]="isProfileRoute" aria-haspopup="menu" [attr.aria-expanded]="isProfileMenuOpen">
          <img [src]="ProfileDetails.profile_image" alt="Profile Image" class="w-10 h-10 rounded-xl object-cover">
        </button>

        <!-- Dropdown -->
        <div class="profile-dd" [class.profile-dd--open]="isProfileMenuOpen"
          [class.profile-dd--closed]="!isProfileMenuOpen" role="menu">
          <button type="button" class="profile-dd__item" role="menuitem" (click)="goToProfileFromMenu()">
            <span class="profile-dd__icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21a8 8 0 0 0-16 0"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </span>
            <span class="profile-dd__label">Profile</span>
          </button>

          <div class="profile-dd__sep"></div>

          <button type="button" class="profile-dd__item profile-dd__item--danger" role="menuitem" (click)="Logout()">
            <span class="profile-dd__icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <path d="M16 17l5-5-5-5"></path>
                <path d="M21 12H9"></path>
              </svg>
            </span>
            <span class="profile-dd__label">Logout</span>
          </button>
        </div>
      </div>

      <!-- Mobile button -->
      <button type="button" (click)="openMobileMenu()"
        class="md:hidden w-12 h-12 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-white/5 rounded-2xl border border-slate-200 dark:border-slate-800 transition-all"
        aria-label="Toggle menu">
        <lucide-icon name="menu" [size]="20" class="text-slate-600 dark:text-slate-300"></lucide-icon>
      </button>
    </div>
  </div>

  <!-- Mobile Overlay -->
  <div (click)="closeMobileMenu()"
    class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[90] md:hidden transition-opacity duration-300"
    [ngClass]="isMobileMenuOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'">
  </div>

  <!-- Mobile Sidebar -->
  <aside
    class="md:hidden fixed top-0 left-0 h-screen w-[85%] max-w-[320px] bg-white dark:bg-slate-950 z-[100] shadow-2xl transition-transform duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] flex flex-col"
    [class.translate-x-0]="isMobileMenuOpen" [class.-translate-x-full]="!isMobileMenuOpen">

    <div class="p-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-[#2E7D32] rounded-xl flex items-center justify-center shadow-lg shadow-emerald-200/50">
          <span class="text-white italic font-black text-xl">E</span>
        </div>
        <span class="font-black text-xl tracking-tight dark:text-white">Ehgazly</span>
      </div>

      <button (click)="closeMobileMenu()"
        class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 dark:bg-white/5 text-slate-500 hover:rotate-90 transition-transform duration-300">
        ✕
      </button>
    </div>

    <hr class="border-slate-100 dark:border-slate-800/60 mx-6">

    <nav class="flex-1 px-4 py-8 space-y-2 overflow-y-auto">

      <!-- Friendly Matches (اضفناه هنا للموبايل) -->
      <a [routerLink]="FriendlyMatchesLink" (click)="onNavClick()"
        class="group flex items-center justify-between px-5 py-4 rounded-2xl transition-all duration-200"
        [ngClass]="active === 'friendly-matches' ? 'bg-emerald-50 text-[#2E7D32]' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-white/5'">
        <div class="flex items-center gap-4">
          <span class="text-xl">⚽</span>
          <span class="font-bold">Friendly Matches</span>
        </div>
        <span class="opacity-0 group-hover:opacity-100 transition-opacity">→</span>
      </a>

      <a [routerLink]="tournamentsLink" (click)="onNavClick()"
        class="group flex items-center justify-between px-5 py-4 rounded-2xl transition-all duration-200"
        [ngClass]="active === 'tournaments' ? 'bg-emerald-50 text-[#2E7D32]' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-white/5'">
        <div class="flex items-center gap-4">
          <span class="text-xl">🏆</span>
          <span class="font-bold">Tournaments</span>
        </div>
        <span class="opacity-0 group-hover:opacity-100 transition-opacity">→</span>
      </a>

      <a [routerLink]="venuesLink" (click)="onNavClick()"
        class="group flex items-center justify-between px-5 py-4 rounded-2xl transition-all duration-200"
        [ngClass]="active === 'venues' ? 'bg-emerald-50 text-[#2E7D32]' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-white/5'">
        <div class="flex items-center gap-4">
          <span class="text-xl">🏟️</span>
          <span class="font-bold">Venues</span>
        </div>
        <span class="opacity-0 group-hover:opacity-100 transition-opacity">→</span>
      </a>

      <a [routerLink]="myBookingsLink" (click)="onNavClick()"
        class="group flex items-center justify-between px-5 py-4 rounded-2xl transition-all duration-200"
        [ngClass]="active === 'my-bookings' ? 'bg-emerald-50 text-[#2E7D32]' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-white/5'">
        <div class="flex items-center gap-4">
          <span class="text-xl">📅</span>
          <span class="font-bold">My Bookings</span>
        </div>
        <span class="opacity-0 group-hover:opacity-100 transition-opacity">→</span>
      </a>

    </nav>

    <div class="p-6 mt-auto border-t border-slate-100 dark:border-slate-800/60 bg-slate-50/50 dark:bg-white/5">
      <button (click)="Logout()"
        class="w-full flex items-center justify-center gap-3 py-4 bg-[#2E7D32] text-white rounded-2xl font-bold shadow-xl shadow-emerald-200/40 hover:bg-[#256329] active:scale-[0.98] transition-all">
        <span>Logout</span>
        <span class="text-lg">➔</span>
      </button>
      <p class="text-center text-xs text-slate-400 mt-4 font-medium">Version 1.0.2 • Ehgazly App</p>
    </div>

  </aside>
</nav>
