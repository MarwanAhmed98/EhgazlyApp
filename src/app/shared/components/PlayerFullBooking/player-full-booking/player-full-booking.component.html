<!-- Main Wrapper -->
<div
    class="min-h-screen bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-50 font-sans selection:bg-[#2E7D32] selection:text-white transition-colors duration-300 relative overflow-hidden">

    <!-- Typography (match Login page) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :host {
            font-family: 'Inter', sans-serif;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp .7s cubic-bezier(.4, 0, .2, 1) both;
        }
    </style>

    <!-- Background Glow Elements -->
    <div
        class="absolute top-0 left-0 -ml-48 -mt-48 w-96 h-96 bg-[#2E7D32]/10 blur-3xl rounded-full pointer-events-none">
    </div>
    <div
        class="absolute bottom-0 right-0 -mr-48 -mb-48 w-96 h-96 bg-[#1565C0]/10 blur-3xl rounded-full pointer-events-none">
    </div>

    <!-- Navbar -->
    <app-playernav></app-playernav>

    <main class="max-w-4xl mx-auto px-6 py-10 sm:py-14 relative z-10">
        <!-- Header -->
        <div class="animate-fade-in-up">
            <div class="flex items-start justify-between gap-4">
                <div class="min-w-0">
                    <h1 class="text-3xl sm:text-4xl font-black tracking-tighter">Booking Details</h1>
                    <p class="mt-2 text-slate-600 dark:text-slate-400 font-semibold">
                        Review your pitch reservation information
                    </p>

                    <div
                        class="mt-4 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-200/70 text-emerald-950 border border-emerald-300/60">
                        <span class="w-2.5 h-2.5 rounded-full bg-emerald-600"></span>
                        <span class="text-xs font-black uppercase tracking-widest">Paid</span>
                    </div>
                </div>

                <div class="flex items-center gap-2 shrink-0">
                    <button type="button"
                        class="w-11 h-11 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white/70 dark:bg-white/5 backdrop-blur-xl hover:bg-white transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0"
                        (click)="share()" aria-label="Share">
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="h-5 w-5 mx-auto text-slate-700 dark:text-slate-200" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7" />
                            <polyline points="16 6 12 2 8 6" />
                            <line x1="12" y1="2" x2="12" y2="15" />
                        </svg>
                    </button>

                    <button type="button"
                        class="w-11 h-11 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white/70 dark:bg-white/5 backdrop-blur-xl hover:bg-white transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0"
                        (click)="more()" aria-label="More">
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="h-5 w-5 mx-auto text-slate-700 dark:text-slate-200" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="1.2" />
                            <circle cx="19" cy="12" r="1.2" />
                            <circle cx="5" cy="12" r="1.2" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Details Card -->
        <section class="mt-8 animate-fade-in-up" style="animation-delay: 90ms;">
            <div
                class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-[2rem] shadow-2xl shadow-slate-200/50 dark:shadow-none overflow-hidden">
                <div class="p-7 sm:p-10">
                    <div class="flex items-start justify-between gap-6">
                        <div class="min-w-0">
                            <h2 class="text-2xl sm:text-3xl font-black tracking-tight text-emerald-950 dark:text-white">
                                {{ booking.title }}
                            </h2>
                            <p class="mt-1 text-sm font-black tracking-widest text-slate-500 dark:text-slate-400">
                                #{{ booking.code }}
                            </p>
                        </div>

                        <button type="button"
                            class="w-12 h-12 rounded-2xl bg-emerald-100/80 dark:bg-emerald-950/30 border border-emerald-200/60 dark:border-emerald-900/40 grid place-items-center shadow-sm hover:shadow-md transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0"
                            aria-label="Venue icon">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#146A1E]" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="12" cy="12" r="9" />
                                <path d="M12 3a9 9 0 0 0 0 18" />
                                <path d="M3 12h18" />
                            </svg>
                        </button>
                    </div>

                    <div class="mt-8 grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div
                            class="rounded-3xl bg-emerald-50/80 dark:bg-slate-950/40 border border-emerald-100 dark:border-slate-800 p-5 sm:p-6 flex items-start gap-4">
                            <span
                                class="w-12 h-12 rounded-2xl bg-emerald-100/80 dark:bg-emerald-950/30 border border-emerald-200/60 dark:border-emerald-900/40 flex items-center justify-center shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#146A1E]"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" />
                                    <path d="M16 2v4M8 2v4M3 10h18" />
                                </svg>
                            </span>
                            <div class="min-w-0">
                                <p
                                    class="text-[11px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400">
                                    Date & Time</p>
                                <p class="mt-1 text-sm font-black text-emerald-950 dark:text-white">{{ booking.dateLabel
                                    }}</p>
                                <p class="mt-1 text-sm font-semibold text-slate-600 dark:text-slate-400">{{
                                    booking.timeLabel }}</p>
                            </div>
                        </div>

                        <div
                            class="rounded-3xl bg-emerald-50/80 dark:bg-slate-950/40 border border-emerald-100 dark:border-slate-800 p-5 sm:p-6 flex items-start gap-4">
                            <span
                                class="w-12 h-12 rounded-2xl bg-emerald-100/80 dark:bg-emerald-950/30 border border-emerald-200/60 dark:border-emerald-900/40 flex items-center justify-center shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#146A1E]"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="6" width="20" height="12" rx="2" />
                                    <path d="M6 10h.01M10 10h.01M14 10h.01" />
                                    <path d="M6 14h6" />
                                </svg>
                            </span>
                            <div class="min-w-0">
                                <p
                                    class="text-[11px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400">
                                    Total Amount</p>
                                <p class="mt-1 text-2xl font-black tracking-tight text-emerald-950 dark:text-white">
                                    {{ booking.amount }} <span class="text-base font-black">EGP</span>
                                </p>
                            </div>
                        </div>
                    </div>

                    <div
                        class="mt-6 rounded-3xl bg-emerald-100/70 dark:bg-emerald-950/20 border border-emerald-200/60 dark:border-emerald-900/40 p-5 sm:p-6 flex items-center gap-4">
                        <span
                            class="w-11 h-11 rounded-2xl bg-white/70 dark:bg-white/5 border border-emerald-200/60 dark:border-emerald-900/40 flex items-center justify-center shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#146A1E]" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M12 21s-7-4.4-7-11a7 7 0 0 1 14 0c0 6.6-7 11-7 11z" />
                                <circle cx="12" cy="10" r="2" />
                            </svg>
                        </span>
                        <p class="text-sm font-black text-emerald-950 dark:text-emerald-100">
                            {{ booking.location }}
                        </p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Payment Receipt -->
        <section class="mt-10 animate-fade-in-up" style="animation-delay: 160ms;">
            <div class="flex items-center gap-3 text-emerald-950 dark:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#146A1E]" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2h9l3 3v17a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" />
                    <path d="M14 2v4h4" />
                    <path d="M8 13h8" />
                    <path d="M8 17h8" />
                    <path d="M8 9h4" />
                </svg>
                <h3 class="text-lg sm:text-xl font-black tracking-tight">Payment Receipt</h3>
            </div>

            <div
                class="mt-4 rounded-[2rem] overflow-hidden border border-emerald-200/60 dark:border-emerald-900/40 shadow-xl shadow-emerald-200/30 dark:shadow-none bg-white/60 dark:bg-white/5 backdrop-blur-xl">
                <div
                    class="relative w-full aspect-[16/10] sm:aspect-[16/9] bg-gradient-to-br from-[#ffb44a] via-[#f59e0b] to-[#0ea5a4]">
                    <img [src]="booking.receiptImage" alt="Receipt preview"
                        class="absolute inset-0 w-full h-full object-cover opacity-25" />
                    <div class="absolute inset-0 flex items-center justify-center p-6">
                        <div
                            class="relative w-[72%] max-w-[360px] aspect-[9/19] rounded-[2.2rem] bg-slate-950/70 border border-white/15 shadow-2xl overflow-hidden">
                            <div class="absolute inset-0 bg-gradient-to-b from-white/10 to-transparent"></div>
                            <img src="https://images.unsplash.com/photo-1551650992-ee4fd47df41f?auto=format&fit=crop&w=900&q=80"
                                alt="Receipt phone mock"
                                class="absolute inset-0 w-full h-full object-cover opacity-35" />
                            <div class="absolute inset-x-0 top-0 h-10 bg-black/25"></div>
                            <div class="absolute inset-x-10 top-16 h-3 rounded-full bg-white/50"></div>
                            <div class="absolute inset-x-10 top-24 h-3 rounded-full bg-white/20"></div>
                            <div class="absolute inset-x-10 top-32 h-3 rounded-full bg-white/20"></div>
                            <div class="absolute inset-x-10 top-44 h-10 rounded-2xl bg-white/15 border border-white/15">
                            </div>
                            <div
                                class="absolute inset-x-10 bottom-12 h-10 rounded-2xl bg-white/20 border border-white/15">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-6 grid grid-cols-1 gap-4">
                <button type="button" (click)="downloadReceipt()"
                    class="w-full bg-[#146A1E] hover:bg-[#0f5418] text-white font-black py-4 rounded-2xl shadow-lg shadow-[#2E7D32]/25 transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0 inline-flex items-center justify-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <path d="M7 10l5 5 5-5" />
                        <path d="M12 15V3" />
                    </svg>
                    Download Receipt
                </button>

                <button type="button" (click)="contactVenue()"
                    class="w-full bg-emerald-200/70 hover:bg-emerald-200 text-emerald-950 dark:text-emerald-100 font-black py-4 rounded-2xl border border-emerald-200/60 dark:border-emerald-900/40 shadow-sm transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0 inline-flex items-center justify-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a4 4 0 0 1-4 4H7l-4 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z" />
                        <path d="M8 9h8" />
                        <path d="M8 13h5" />
                    </svg>
                    Contact Venue
                </button>

                <button type="button" (click)="cancelBooking()"
                    class="w-full py-3 text-sm font-black text-red-600 hover:text-red-700 transition-colors inline-flex items-center justify-center gap-2">
                    <span
                        class="w-6 h-6 rounded-full bg-red-100 text-red-700 inline-flex items-center justify-center border border-red-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6L6 18" />
                            <path d="M6 6l12 12" />
                        </svg>
                    </span>
                    Cancel Booking
                </button>
            </div>
        </section>
    </main>
</div>
