    <div class="ai-panel" [class.open]="isOpen">
        <!-- Header -->
        <div class="ai-panel__header">
            <div class="header-left">
                <div class="header-icon">
                    <svg viewBox="0 0 32 32" fill="none" width="22" height="22">
                        <circle cx="16" cy="16" r="15" fill="#DCFCE7" stroke="#136336" stroke-width="1" />
                        <polygon points="16,8 20,13 18,19 14,19 12,13" fill="#136336" opacity="0.9" />
                        <polygon points="16,8 12,13 8,9 11,5" fill="#165a21" opacity="0.7" />
                        <polygon points="16,8 20,13 24,9 21,5" fill="#165a21" opacity="0.7" />
                    </svg>
                </div>
                <div>
                    <h3 class="header-title">AI Assistant</h3>
                    <span class="header-status">
                        <span class="status-dot"></span>Online
                    </span>
                </div>
            </div>
            <button class="close-btn" (click)="togglePanel()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>

        <!-- Chat Messages -->
        <div class="ai-panel__messages" #messagesContainer>
            <div class="welcome-state" *ngIf="messages.length === 0 && !loadingQuestions && !loading">
                <div class="welcome-icon">⚽</div>
                <p class="welcome-text">مرحباً! كيف يمكنني مساعدتك اليوم؟</p>
            </div>

            <div *ngFor="let msg of messages; trackBy: trackByIndex" class="message-row"
                [class.user-row]="msg.role === 'user'" [class.ai-row]="msg.role === 'ai'">
                <div class="message-bubble" [class.user-bubble]="msg.role === 'user'"
                    [class.ai-bubble]="msg.role === 'ai'">
                    <span *ngIf="msg.role === 'ai'" class="msg-icon">⚽</span>
                    {{ msg.content }}
                </div>
            </div>

            <div class="message-row ai-row" *ngIf="loading">
                <div class="message-bubble ai-bubble loading-bubble">
                    <span class="dot-1">●</span>
                    <span class="dot-2">●</span>
                    <span class="dot-3">●</span>
                </div>
            </div>
        </div>

        <!-- Suggested Questions: skeleton while loading -->
        <div class="ai-panel__suggestions" *ngIf="loadingQuestions">
            <p class="suggestions-label">اقتراحات</p>
            <div class="suggestions-scroll">
                <div class="skeleton-chip" *ngFor="let s of skeletonItems"></div>
            </div>
        </div>

        <!-- Suggested Questions: real data -->
        <div class="ai-panel__suggestions" *ngIf="!loadingQuestions && suggestedQuestions.length > 0">
            <p class="suggestions-label">اقتراحات</p>
            <div class="suggestions-scroll">
                <button *ngFor="let q of suggestedQuestions; trackBy: trackByIndex" class="suggestion-chip"
                    (click)="selectQuestion(q)" [disabled]="loading" type="button">
                    {{ q }}
                </button>
            </div>
        </div>

        <!-- No questions fallback -->
        <div class="ai-panel__suggestions" *ngIf="!loadingQuestions && questionsError">
            <p class="suggestions-label error-label">تعذّر تحميل الاقتراحات</p>
        </div>

        <!-- Input -->
        <div class="ai-panel__input">
            <input #inputField type="text" [(ngModel)]="userInput" (keydown.enter)="sendMessage()"
                placeholder="اكتب سؤالك هنا..." [disabled]="loading" class="chat-input" dir="rtl" />
            <button class="send-btn" type="button" (click)="sendMessage()" [disabled]="loading || !userInput.trim()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
            </button>
        </div>
    </div>
</div>
